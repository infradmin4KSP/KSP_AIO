[paths]
; quotes, trailink slash, spaces around are not important (anyway will be removed); environment variables may be used (CMD or PS syntax)
;savepath — where KSP saves are stored (must contain "Saves", "Screenshots", "thumbs" directories)
savepath  = "G:\Saves\KSP"
;tmplpath — where settings as files ar stored (must contain "GameData" and "Saves" directories, "GameData.json", "Saves.json" and settings_%locale%.cfg files)
tmplpath  = "G:\Backup\KSP"
;kmlpaths — where KML utility (KML.exe) is located; if no .exe filename, "KML.exe" will be added
kmlpath   = "G:\Saves\KSP"
;cachepath — where CKAN cache is located
cachepath = "%LOCALAPPDATA%\CKAN\downloads"
